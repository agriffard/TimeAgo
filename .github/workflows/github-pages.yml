name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Publish sample app
        run: dotnet publish samples/TimeAgochi.Sample/TimeAgochi.Sample.csproj -c Release -o artifacts/github-pages

      - name: Prepare Pages artifact
        shell: bash
        run: |
          site_dir="artifacts/github-pages/wwwroot"
          base_path="${{ vars.PAGES_BASE_PATH }}"

          if [[ -z "$base_path" ]]; then
            base_path="/${{ github.event.repository.name }}/"
          fi

          if [[ "$base_path" != /* ]]; then
            base_path="/$base_path"
          fi

          if [[ "$base_path" != */ ]]; then
            base_path="${base_path}/"
          fi

          sed -i "s|<base href=\"/\" />|<base href=\"${base_path}\" />|" "$site_dir/index.html"
          cp "$site_dir/index.html" "$site_dir/404.html"
          touch "$site_dir/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/github-pages/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@v4
